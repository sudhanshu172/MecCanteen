    // ============================================================
    // DASHBOARD COMPONENT
    // ============================================================
    function Dashboard({ currentUser, logout }) {
      const isAdmin = currentUser.role === 'admin';
      const isCanteenIncharge = currentUser.role === 'canteen_incharge';
      const isDelivery = currentUser.role === 'delivery';
      const canManageMenu = isAdmin || isCanteenIncharge;

      const [activeView, setActiveView] = useState(
        isDelivery ? 'delivery_dashboard' : canManageMenu ? 'active_orders' : 'home'
      );

      React.useEffect(() => {
        if (currentUser.role !== 'incharge') return;

        if (Notification.permission === "default") {
          Notification.requestPermission();
        }

        const now = firebase.firestore.Timestamp.now();

        const unsubscribe = db.collection('orders')
          .where('status', '==', 'pending')
          .where('createdAt', '>', now)
          .onSnapshot((snapshot) => {
            snapshot.docChanges().forEach((change) => {
              if (change.type === "added") {
                const newOrder = change.doc.data();
                triggerNewOrderAlert(newOrder);
              }
            });
          }, (error) => {
            console.error("Listener failed:", error);
          });

        return () => unsubscribe();
      }, [currentUser]);

      const triggerNewOrderAlert = (order) => {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(e => console.log("Audio play blocked until user interacts with page."));

        if (Notification.permission === "granted") {
          new Notification("New Canteen Order! 🍔", {
            body: `Order for ₹${order.totalAmount} from ${order.userName}`,
            icon: "https://cdn-icons-png.flaticon.com/512/3443/3443338.png",
            tag: "new-order",
          });
        }

        if ("vibrate" in navigator) {
          navigator.vibrate([200, 100, 200]);
        }
      };

      // Delivery specific view without other navigation
      if (isDelivery) {
        return (
          <div style={{ minHeight: '100vh', background: 'var(--background)' }}>
            <div className="glass-panel" style={{ padding: '1rem 1.5rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0' }}>
              <div>
                <h1 style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--primary)' }}>🍽️ Delivery</h1>
                <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Welcome, {currentUser.name}</p>
              </div>
              <button onClick={logout} className="btn-secondary">
                <Icons.LogOut /> Logout
              </button>
            </div>
            <DeliveryDashboard currentUser={currentUser} />
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', background: 'var(--background)' }}>
          {/* Header */}
          <div className="glass-panel" style={{ padding: '1rem 1.5rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0' }}>
            <div>
              <h1 style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--primary)' }}>🍽️ Mecon Canteen</h1>
              <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Welcome, Dear {currentUser.name}</p>
            </div>
            <button onClick={logout} className="btn-secondary">
              <Icons.LogOut /> Logout
            </button>
          </div>

          {/* Navigation */}
          <div className="glass-panel" style={{ padding: '1rem 1.5rem', margin: '1rem 0', display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
            {canManageMenu && (
              <button onClick={() => setActiveView('active_orders')} className={activeView === 'active_orders' ? 'btn-primary' : 'btn-secondary'}>
                <Icons.Package /> Active Orders
              </button>
            )}

            <button onClick={() => setActiveView('home')} className={activeView === 'home' ? 'btn-primary' : 'btn-secondary'}>
              <Icons.ShoppingCart /> Order Food
            </button>

            {canManageMenu && (
              <>
                <button onClick={() => setActiveView('menu')} className={activeView === 'menu' ? 'btn-primary' : 'btn-secondary'}>
                  <Icons.Menu /> Menu Management
                </button>
                <button onClick={() => setActiveView('delivery_staff')} className={activeView === 'delivery_staff' ? 'btn-primary' : 'btn-secondary'}>
                  <Icons.Truck /> Delivery Staff
                </button>
                <button onClick={() => setActiveView('settings')} className={activeView === 'settings' ? 'btn-primary' : 'btn-secondary'}>
                  <Icons.Settings /> Settings
                </button>
              </>
            )}
            {isAdmin && (
              <button onClick={() => setActiveView('personnel')} className={activeView === 'personnel' ? 'btn-primary' : 'btn-secondary'}>
                <Icons.User /> Personnel
              </button>
            )}
          </div>

          {/* Main Content */}
          <div>
            {activeView === 'active_orders' && canManageMenu && <ActiveOrdersManagement />}
            {activeView === 'home' && <UserOrdering currentUser={currentUser} />}
            {activeView === 'menu' && canManageMenu && <MenuManagement currentUser={currentUser} />}
            {activeView === 'delivery_staff' && canManageMenu && <DeliveryManManagement />}
            {activeView === 'settings' && canManageMenu && <CanteenSettings />}
            {activeView === 'personnel' && isAdmin && <PersonnelManagement />}
          </div>
        </div>
      );
    }

    // ============================================================
    // MAIN APP COMPONENT
    // ============================================================
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [view, setView] = useState('login'); // login, register, dashboard, forcePasswordChange
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [authError, setAuthError] = useState('');
      const [authSuccess, setAuthSuccess] = useState('');
      const [loading, setLoading] = useState(true);
      const [fcNewPw, setFcNewPw] = useState('');
      const [fcConfirmPw, setFcConfirmPw] = useState('');

      // Auth state listener
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            // THE FIX:
            const personnelNo = user.email.replace('@canteen.internal', '').toUpperCase();
            const userDoc = await db.collection('canteen_users').doc(personnelNo).get();
            if (userDoc.exists) {
              const userData = userDoc.data();
              setCurrentUser(userData);
              if (userData.requiresPasswordChange) {
                setView('forcePasswordChange');
              } else {
                setView('dashboard');
              }
            }
          } else {
            setCurrentUser(null);
            setView('login');
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');

        try {
          const email = `${loginId}@canteen.internal`;
          await auth.signInWithEmailAndPassword(email, loginPw);
        } catch (error) {
          console.error('Login error:', error);
          setAuthError('Invalid credentials. Please try again.');
        }
      };

      const handleForceChange = async (e) => {
        e.preventDefault();
        setAuthError('');
        if (fcNewPw.length < 6) { setAuthError('Password must be at least 6 characters.'); return; }
        if (fcNewPw !== fcConfirmPw) { setAuthError('Passwords do not match.'); return; }

        try {
          const user = auth.currentUser;
          await user.updatePassword(fcNewPw);
          await db.collection('canteen_users').doc(currentUser.id).update({ requiresPasswordChange: false });
          setCurrentUser({ ...currentUser, requiresPasswordChange: false });
          setFcNewPw(''); setFcConfirmPw('');
          setView('dashboard');
        } catch (error) {
          setAuthError('Error updating password. You may need to log out and try again.');
        }
      };

      const logout = async () => {
        await auth.signOut();
        setCurrentUser(null);
        setLoginId(''); setLoginPw('');
        setView('login');
      };

      if (loading) {
        return (
          <div className="auth-container">
            <div className="glass-panel auth-box">
              <p>Loading...</p>
            </div>
          </div>
        );
      }

      // LOGIN VIEW
      if (!currentUser && view === 'login') {
        return (
          <div className="auth-container">
            <div className="glass-panel auth-box">
              <div className="auth-header">
                <h1>🍽️ Mecon Canteen</h1>
                <p>Sign in to order food</p>
              </div>
              {authError && <div className="alert-warning">{authError}</div>}
              {authSuccess && <div className="alert-success">{authSuccess}</div>}
              <form onSubmit={handleLogin} autoComplete="off" style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                <div className="form-group">
                  <label>Personnel No.</label>
                  <input type="text" value={loginId} onChange={e => setLoginId(e.target.value.toUpperCase().trim())} required placeholder="Enter Personnel No." />
                </div>
                <div className="form-group">
                  <label>Password</label>
                  <input type="password" value={loginPw} onChange={e => setLoginPw(e.target.value)} required autoComplete="new-password" placeholder="Enter your password" />
                </div>
                <button type="submit" className="btn-primary">Sign In</button>
              </form>
              <div className="auth-link">
                <button onClick={() => setView('register')} className="link-button">Create New Account →</button>
              </div>
            </div>
          </div>
        );
      }

      // REGISTER VIEW
      if (!currentUser && view === 'register') {
        return <RegistrationForm onBack={() => setView('login')} onSuccess={(msg) => { setAuthSuccess(msg); setView('login'); }} />;
      }

      // FORCE PASSWORD CHANGE VIEW
      if (currentUser && view === 'forcePasswordChange') {
        return (
          <div className="auth-container">
            <div className="glass-panel auth-box">
              <div className="auth-header">
                <h1>Welcome, Dear {currentUser.name}!</h1>
                <p>Please set a new password for your first login</p>
              </div>
              {authError && <div className="alert-warning">{authError}</div>}
              <form onSubmit={handleForceChange} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                <div className="form-group">
                  <label>New Password</label>
                  <input type="password" value={fcNewPw} onChange={e => setFcNewPw(e.target.value)} required autoComplete="new-password" placeholder="Min 6 characters" />
                </div>
                <div className="form-group">
                  <label>Confirm New Password</label>
                  <input type="password" value={fcConfirmPw} onChange={e => setFcConfirmPw(e.target.value)} required autoComplete="new-password" />
                </div>
                <button type="submit" className="btn-primary">Set Password &amp; Continue</button>
              </form>
            </div>
          </div>
        );
      }

      // DASHBOARD VIEW
      if (currentUser && view === 'dashboard') {
        return <Dashboard currentUser={currentUser} logout={logout} />;
      }

      return <div className="auth-container"><div className="glass-panel auth-box"><p>Loading...</p></div></div>;
    }

    // ============================================================
    // ROOT RENDER
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered', reg))
          .catch(err => console.log('SW Registration Failed', err));
      });
    }
  </script>
</body>

</html>
