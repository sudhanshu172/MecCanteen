    // Check if current time is within a from-to schedule (HH:MM 24hr strings)
    const isWithinTimeSchedule = (from, to) => {
      if (!from || !to) return true; // No schedule = always available
      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const [fH, fM] = from.split(':').map(Number);
      const [tH, tM] = to.split(':').map(Number);
      const fromMinutes = fH * 60 + fM;
      const toMinutes = tH * 60 + tM;
      if (toMinutes >= fromMinutes) {
        return currentMinutes >= fromMinutes && currentMinutes <= toMinutes;
      }
      // Handles overnight ranges (e.g., 22:00 - 02:00)
      return currentMinutes >= fromMinutes || currentMinutes <= toMinutes;
    };

      const [h, m] = timeStr.split(':').map(Number);

      const h12 = h % 12 || 12;
      return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;

    // ============================================================
    // REGISTRATION COMPONENT
    // ============================================================
    function RegistrationForm({ onBack, onSuccess }) {
      const [formData, setFormData] = useState({
        name: '',
        personnelNo: '',
        phone: '',
        email: '',
        designation: DESIGNATIONS[0]
      });
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        setError('');
      };

      const validateForm = () => {
        if (!formData.name.trim()) return 'Name is required';
        if (!/^[A-Z0-9]{5}$/.test(formData.personnelNo)) return 'Personnel No. must be exactly 5 alphanumeric characters';
        if (!/^\d{10}$/.test(formData.phone)) return 'Phone number must be exactly 10 digits';
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) return 'Invalid email format';
        return null;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        const validationError = validateForm();
        if (validationError) {
          setError(validationError);
          return;
        }

        setLoading(true);
        try {
          // Check if personnel number is in approved list
          const personnelDoc = await db.collection('approved_personnel').doc(formData.personnelNo).get();
          if (!personnelDoc.exists) {
            setError('Personnel Number not found in approved list. Contact admin.');
            setLoading(false);
            return;
          }

          // Check if user already exists
          const existingUser = await db.collection('canteen_users').doc(formData.personnelNo).get();
          if (existingUser.exists) {
            setError('Account already exists for this Personnel Number');
            setLoading(false);
            return;
          }

          // Create Firebase Auth user
          const email = `${formData.personnelNo}@canteen.internal`;
          const userCredential = await secondaryAuth.createUserWithEmailAndPassword(email, DEFAULT_PASSWORD);
          await secondaryAuth.signOut(); // Sign out from secondary app

          // Create Firestore user document
          await db.collection('canteen_users').doc(formData.personnelNo).set({
            id: formData.personnelNo,
            personnelNo: formData.personnelNo,
            name: formData.name,
            email: formData.email,
            phone: formData.phone,
            designation: formData.designation,
            role: 'user',
            requiresPasswordChange: true,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          onSuccess('Account created successfully! Please login with your Personnel Number and password: Mess@123');
        } catch (err) {
          console.error('Registration error:', err);
          setError(err.message || 'Registration failed. Please try again.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="auth-container">
          <div className="glass-panel auth-box">
            <div className="auth-header">
              <h1>Create Account</h1>
              <p>Join the canteen ordering system</p>
            </div>
            {error && <div className="alert-warning">{error}</div>}
            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div className="form-group">
                <label>Full Name *</label>
                <input
                  type="text"
                  value={formData.name}
                  onChange={e => handleChange('name', e.target.value)}
                  placeholder="Enter your full name"
                  required
                />
              </div>
              <div className="form-group">
                <label>Personnel No. * (5 characters)</label>
                <input
                  type="text"
                  value={formData.personnelNo}
                  onChange={e => handleChange('personnelNo', e.target.value.toUpperCase())}
                  placeholder="e.g., A1234"
                  maxLength="5"
                  required
                  style={{ textTransform: 'uppercase' }}
                />
              </div>
              <div className="form-group">
                <label>Phone Number * (10 digits)</label>
                <input
                  type="tel"
                  value={formData.phone}
                  onChange={e => handleChange('phone', e.target.value.replace(/\D/g, ''))}
                  placeholder="Enter 10 digit mobile number"
                  maxLength="10"
                  required
                />
              </div>
              <div className="form-group">
                <label>Email Address *</label>
                <input
                  type="email"
                  value={formData.email}
                  onChange={e => handleChange('email', e.target.value)}
                  placeholder="your.email@company.com"
                  required
                />
              </div>
              <div className="form-group">
                <label>Designation *</label>
                <select
                  value={formData.designation}
                  onChange={e => handleChange('designation', e.target.value)}
                  required
                >
                  {DESIGNATIONS.map(des => (
                    <option key={des} value={des}>{des}</option>
                  ))}
                </select>
              </div>
              <button type="submit" className="btn-primary" disabled={loading}>
                {loading ? 'Creating Account...' : 'Create Account'}
              </button>
            </form>
            <div className="auth-link">
              <button onClick={onBack} className="link-button">← Back to Login</button>
            </div>
          </div>
        </div>
      );
    }

      const [menuItems, setMenuItems] = useState([]);

        availableFrom: TIME_DEFAULTS['Breakfast'].from,
        availableTo: TIME_DEFAULTS['Breakfast'].to
      });
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      const CATEGORIES = ['Breakfast', 'Lunch', 'Snacks', 'Beverages', 'Dinner'];

      useEffect(() => {
        const unsubscribe = db.collection('menu_items')
          // Removed the two orderBy() lines
          .onSnapshot(snapshot => {
            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // Sort items locally in React
            items.sort((a, b) => {
              if (a.category === b.category) return a.name.localeCompare(b.name);
              return a.category.localeCompare(b.category);
            });

            setMenuItems(items);
          }, error => {
            console.error("Menu fetch error:", error); // Added error logging
          });
        return unsubscribe;
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setSuccess('');

        if (!formData.name.trim() || !formData.price) {
          setError('Name and price are required');
          return;
        }

        try {
          const itemData = {
            ...formData,
            price: parseFloat(formData.price),
            updatedBy: currentUser.name,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          if (editingItem) {
            await db.collection('menu_items').doc(editingItem.id).update(itemData);
            setSuccess('Menu item updated successfully');
          } else {
            await db.collection('menu_items').add({
              ...itemData,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            setSuccess('Menu item added successfully');
          }

          setFormData({ name: '', description: '', price: '', category: 'Breakfast', available: true, availableFrom: TIME_DEFAULTS['Breakfast'].from, availableTo: TIME_DEFAULTS['Breakfast'].to });
          setEditingItem(null);
          setShowAddForm(false);
        } catch (err) {
          setError(err.message);
        }
      };

      const handleEdit = (item) => {
        setFormData({
          name: item.name,
          description: item.description || '',
          price: item.price.toString(),
          category: item.category,
          available: item.available,
          availableFrom: item.availableFrom || TIME_DEFAULTS[item.category]?.from || '',
          availableTo: item.availableTo || TIME_DEFAULTS[item.category]?.to || ''
        });
        setEditingItem(item);
        setShowAddForm(true);
      };

      const handleDelete = async (itemId) => {
        if (!confirm('Are you sure you want to delete this item?')) return;

        // 1. OPTIMISTIC UI: Instantly remove the item from the screen
        setMenuItems(prevItems => prevItems.filter(item => item.id !== itemId));

        try {
          // 2. Perform the actual deletion in the background
          await db.collection('menu_items').doc(itemId).delete();

          setSuccess('Menu item deleted successfully');

          // Auto-hide the success message after 3 seconds
          setTimeout(() => setSuccess(''), 3000);
        } catch (err) {
          setError('Failed to delete: ' + err.message);
        }
      };

      const toggleAvailability = async (item) => {
        // 1. OPTIMISTIC UI: Instantly flip the visual switch so it doesn't look stuck
        setMenuItems(prevItems =>
          prevItems.map(m => m.id === item.id ? { ...m, available: !item.available } : m)
        );

        try {
          // 2. Perform the actual database update in the background
          await db.collection('menu_items').doc(item.id).update({
            available: !item.available,
            updatedBy: currentUser.name,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          setSuccess(`"${item.name}" marked as ${!item.available ? 'Available' : 'Unavailable'}`);
          setTimeout(() => setSuccess(''), 3000);
        } catch (err) {
          // 3. If the database fails (e.g., internet disconnects), snap the visual toggle back
          setMenuItems(prevItems =>
            prevItems.map(m => m.id === item.id ? { ...m, available: item.available } : m)
          );
          setError('Failed to update: ' + err.message);
        }
      };

      const groupedItems = useMemo(() => {
        const grouped = {};
        CATEGORIES.forEach(cat => grouped[cat] = []);
        menuItems.forEach(item => {
          if (grouped[item.category]) {
            grouped[item.category].push(item);
          }
        });
        return grouped;
      }, [menuItems]);

      return (
        <div style={{ padding: '1.5rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
            <h2 style={{ fontSize: '1.5rem', fontWeight: 600 }}>Menu Management</h2>
            <button onClick={() => { setShowAddForm(!showAddForm); setEditingItem(null); setFormData({ name: '', description: '', price: '', category: 'Breakfast', available: true, availableFrom: TIME_DEFAULTS['Breakfast'].from, availableTo: TIME_DEFAULTS['Breakfast'].to }); }} className="btn-primary">
              <Icons.Plus /> {showAddForm ? 'Cancel' : 'Add Item'}
            </button>
          </div>

          {error && <div className="alert-warning" style={{ marginBottom: '1rem' }}>{error}</div>}
          {success && <div className="alert-success" style={{ marginBottom: '1rem' }}>{success}</div>}

          {showAddForm && (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1.5rem' }}>
              <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem' }}>
                {editingItem ? 'Edit Menu Item' : 'Add New Menu Item'}
              </h3>
              <form onSubmit={handleSubmit} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem' }}>
                <div className="form-group">
                  <label>Item Name *</label>
                  <input type="text" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} required />
                </div>
                <div className="form-group">
                  <label>Category *</label>
                  <select value={formData.category} onChange={e => {
                    const cat = e.target.value;
                    const defaults = TIME_DEFAULTS[cat] || { from: '', to: '' };
                    setFormData({ ...formData, category: cat, availableFrom: defaults.from, availableTo: defaults.to });
                  }} required>
                    {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Price (₹) *</label>
                  <input type="number" step="0.01" value={formData.price} onChange={e => setFormData({ ...formData, price: e.target.value })} required />
                </div>
                <div className="form-group">
                  <label>Description</label>
                  <input type="text" value={formData.description} onChange={e => setFormData({ ...formData, description: e.target.value })} />
                </div>
                <div className="form-group">
                  <label>Available From (optional)</label>
                  <input type="time" value={formData.availableFrom} onChange={e => setFormData({ ...formData, availableFrom: e.target.value })} />
                </div>
                <div className="form-group">
                  <label>Available To (optional)</label>
                  <input type="time" value={formData.availableTo} onChange={e => setFormData({ ...formData, availableTo: e.target.value })} />
                </div>
                <div className="form-group" style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <input type="checkbox" id="available" checked={formData.available} onChange={e => setFormData({ ...formData, available: e.target.checked })} />
                  <label htmlFor="available" style={{ margin: 0 }}>Available</label>
                </div>
                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-end' }}>
                  <button type="submit" className="btn-primary">
                    {editingItem ? 'Update' : 'Add'} Item
                  </button>
                </div>
              </form>
            </div>
          )}

          {Object.entries(groupedItems).map(([category, items]) => (
            items.length > 0 && (
              <div key={category} style={{ marginBottom: '2rem' }}>
                <h3 style={{ fontSize: '1.2rem', fontWeight: 600, marginBottom: '1rem', color: 'var(--primary)' }}>{category}</h3>
                <div style={{ display: 'grid', gap: '1rem' }}>
                  {items.map(item => (
                    <div key={item.id} className="glass-panel" style={{ padding: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', opacity: item.available ? 1 : 0.6 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.25rem' }}>
                          <h4 style={{ fontSize: '1rem', fontWeight: 600 }}>{item.name}</h4>
                          <span className={item.available ? 'badge-success' : 'badge-warning'}>
                            {item.available ? 'Available' : 'Unavailable'}

                        </div>
                        {item.description && <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>{item.description}</p>}

    // ============================================================
    // PERSONNEL MANAGEMENT (Admin only)
    // ============================================================
    function PersonnelManagement() {
      const [personnelList, setPersonnelList] = useState([]);
      const [uploading, setUploading] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      useEffect(() => {
        const unsubscribe = db.collection('approved_personnel')
          .onSnapshot(snapshot => {
            const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setPersonnelList(list);
          });
        return unsubscribe;
      }, []);

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.name.endsWith('.csv')) {
          setError('Please upload a CSV file');
          return;
        }

        setUploading(true);
        setError('');
        setSuccess('');

        try {
          const text = await file.text();
          const lines = text.split('\n').map(l => l.trim()).filter(l => l);
          const personnelNos = lines.slice(1).map(line => {
            const cols = line.split(',');
            return cols[0].trim().toUpperCase();
          }).filter(no => /^[A-Z0-9]{5}$/.test(no));

          if (personnelNos.length === 0) {
            setError('No valid personnel numbers found in CSV');
            setUploading(false);
            return;
          }

          // Batch write to Firestore
          const batch = db.batch();
          personnelNos.forEach(no => {
            const ref = db.collection('approved_personnel').doc(no);
            batch.set(ref, {
              personnelNo: no,
              addedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          });

          await batch.commit();
          setSuccess(`Successfully added ${personnelNos.length} personnel numbers`);
          e.target.value = ''; // Reset file input
        } catch (err) {
          setError(err.message);
        } finally {
          setUploading(false);
        }
      };

      const handleManualAdd = async () => {
        const personnelNo = prompt('Enter Personnel Number (5 characters):');
        if (!personnelNo) return;
        const cleaned = personnelNo.trim().toUpperCase();
        if (!/^[A-Z0-9]{5}$/.test(cleaned)) {
          setError('Invalid format. Must be 5 alphanumeric characters.');
          return;
        }

        try {
          await db.collection('approved_personnel').doc(cleaned).set({
            personnelNo: cleaned,
            addedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setSuccess(`Added ${cleaned} successfully`);
        } catch (err) {
          setError(err.message);
        }
      };

      const handleDelete = async (personnelNo) => {
        if (!confirm(`Remove ${personnelNo} from approved list?`)) return;
        try {
          await db.collection('approved_personnel').doc(personnelNo).delete();
          setSuccess(`Removed ${personnelNo}`);
        } catch (err) {
          setError(err.message);
        }
      };

      return (
        <div style={{ padding: '1.5rem' }}>
          <h2 style={{ fontSize: '1.5rem', fontWeight: 600, marginBottom: '1.5rem' }}>Personnel Management</h2>

          {error && <div className="alert-warning" style={{ marginBottom: '1rem' }}>{error}</div>}
          {success && <div className="alert-success" style={{ marginBottom: '1rem' }}>{success}</div>}

          <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1.5rem' }}>
            <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem' }}>Upload CSV File</h3>
            <p style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', marginBottom: '1rem' }}>
              Upload a CSV file with personnel numbers. Format: First column should contain 5-character personnel numbers.
            </p>
            <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
              <input
                type="file"
                accept=".csv"
                onChange={handleFileUpload}
                disabled={uploading}
                style={{ flex: 1 }}
              />
              <button onClick={handleManualAdd} className="btn-secondary">
                <Icons.Plus /> Add Manually
              </button>
            </div>
            {uploading && <p style={{ marginTop: '1rem', color: 'var(--primary)' }}>Uploading...</p>}
          </div>

          <div className="glass-panel" style={{ padding: '1.5rem' }}>
            <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem' }}>
              Approved Personnel ({personnelList.length})
            </h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: '0.5rem', maxHeight: '400px', overflow: 'auto' }}>
              {personnelList.map(p => (
                <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem', background: 'var(--surface)', borderRadius: '0.375rem' }}>
                  <span style={{ fontWeight: 500 }}>{p.personnelNo}</span>
                  <button onClick={() => handleDelete(p.personnelNo)} className="icon-button" style={{ fontSize: '0.75rem' }}>
                    <Icons.Trash />
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // USER ORDERING COMPONENT
    // ============================================================
    function UserOrdering({ currentUser }) {
      const [menuItems, setMenuItems] = useState([]);
      const [cart, setCart] = useState({});
      const [myOrders, setMyOrders] = useState([]);
      const [activeTab, setActiveTab] = useState('menu');
      const [settings, setSettings] = useState(null);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [otpInput, setOtpInput] = useState('');
      const [selectedOrder, setSelectedOrder] = useState(null);
      // Address state
      const [savedAddresses, setSavedAddresses] = useState(currentUser.savedAddresses || []);
      const [selectedAddressId, setSelectedAddressId] = useState((currentUser.savedAddresses || []).find(a => a.isDefault)?.id || '');
      const [showAddAddress, setShowAddAddress] = useState(false);
      const [newAddress, setNewAddress] = useState({ quarterNo: '', block: '', label: '' });
      const [editingAddress, setEditingAddress] = useState(null);

      useEffect(() => {
        // Load menu items
        const unsubMenu = db.collection('menu_items')
          // Removed the two orderBy() lines
          .onSnapshot(snapshot => {
            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // Sort items locally in React
            items.sort((a, b) => {
              if (a.category === b.category) return a.name.localeCompare(b.name);
              return a.category.localeCompare(b.category);
            });

            setMenuItems(items);
          }, error => {
            console.error("Menu fetch error:", error); // Added error logging
          });

        // Load settings
        const unsubSettings = db.collection('canteen_settings').doc('general')
          .onSnapshot(doc => {
            if (doc.exists) setSettings(doc.data());
          });
        // Load my orders
        const unsubOrders = db.collection('orders')
          .where('userId', '==', currentUser.id)
          // REMOVED orderBy to prevent Firestore from hiding new orders with pending timestamps
          .limit(20)
          .onSnapshot(snapshot => {
            // Sort the orders manually in JavaScript instead
            const orders = snapshot.docs
              .map(doc => ({ id: doc.id, ...doc.data() }))
              .sort((a, b) => {
                const timeA = a.createdAt?.toMillis() || Date.now();
                const timeB = b.createdAt?.toMillis() || Date.now();
                return timeB - timeA;
              });
            setMyOrders(orders);
          });

        return () => {
          unsubMenu();
          unsubSettings();
          unsubOrders();
        };
      }, [currentUser.id]);

      const availableItems = useMemo(() => menuItems.filter(item => item.available && isWithinTimeSchedule(item.availableFrom, item.availableTo)), [menuItems]);
      const scheduledLaterItems = useMemo(() => menuItems.filter(item => item.available && !isWithinTimeSchedule(item.availableFrom, item.availableTo)), [menuItems]);
      const unavailableItems = useMemo(() => menuItems.filter(item => !item.available), [menuItems]);

      const addToCart = (item) => {
        setCart(prev => ({
          ...prev,
          [item.id]: {
            ...item,
            quantity: (prev[item.id]?.quantity || 0) + 1
          }
        }));
        setSuccess(`Added ${item.name} to cart`);
        setTimeout(() => setSuccess(''), 2000);
      };

      const updateQuantity = (itemId, delta) => {
        setCart(prev => {
          const newCart = { ...prev };
          const current = newCart[itemId]?.quantity || 0;
          const newQty = current + delta;
          if (newQty <= 0) {
            delete newCart[itemId];
          } else {
            newCart[itemId] = { ...newCart[itemId], quantity: newQty };
          }
          return newCart;
        });
      };

      const cartItems = Object.values(cart);
      const cartSubtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const deliveryFee = settings && cartSubtotal < (settings.freeDeliveryAbove ?? 149) ? (settings.deliveryFee ?? 25) : 0;
      const cartTotal = cartSubtotal + deliveryFee;
      const minOrderValue = settings?.minOrderValue ?? 50;
      const isBelowMin = cartSubtotal < minOrderValue && cartItems.length > 0;

      const placeOrder = async () => {
        if (cartItems.length === 0) { setError('Cart is empty'); return; }
        if (!settings?.orderingEnabled) { setError('Ordering is currently disabled by canteen in-charge'); return; }
        if (isBelowMin) { setError(`Minimum order value is ${formatPrice(minOrderValue)}`); return; }
        const selectedAddr = savedAddresses.find(a => a.id === selectedAddressId);
        if (!selectedAddr) { setError('Please select a delivery address'); return; }

        try {
          const orderId = generateOrderId();
          const otp = generateOTP();
          await db.collection('orders').add({
            orderId, userId: currentUser.id, userName: currentUser.name, userPhone: currentUser.phone,
            items: cartItems.map(item => ({ id: item.id, name: item.name, price: item.price, quantity: item.quantity })),
            subtotalAmount: cartSubtotal,
            deliveryFee: deliveryFee,
            totalAmount: cartTotal,
            deliveryOTP: otp,
            deliveryAddress: { quarterNo: selectedAddr.quarterNo, block: selectedAddr.block, label: selectedAddr.label },
            status: 'pending',
            canteenInchargePhone: settings.canteenInchargePhone,
            canteenInchargeName: settings.canteenInchargeName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setSuccess(`Order placed! Order ID: ${orderId}, Your OTP: ${otp}`);
          setCart({});
          setActiveTab('orders');
        } catch (err) { setError(err.message); }
      };

      const verifyAndDeliver = async (order) => {
        if (!otpInput) { setError('Please enter OTP'); return; }
        if (otpInput !== order.deliveryOTP) { setError('Invalid OTP'); return; }
        try {
          await db.collection('orders').doc(order.id).update({ status: 'delivered', deliveredAt: firebase.firestore.FieldValue.serverTimestamp() });
          setSuccess('Order marked as delivered!');
          setOtpInput(''); setSelectedOrder(null);
        } catch (err) { setError(err.message); }
      };

      // Address management functions
      const saveAddress = async (addr) => {
        const addrWithId = { ...addr, id: addr.id || `addr_${Date.now()}` };
        let updated;
        if (editingAddress) {
          updated = savedAddresses.map(a => a.id === editingAddress.id ? addrWithId : a);
        } else {
          if (savedAddresses.length === 0) addrWithId.isDefault = true;
          updated = [...savedAddresses, addrWithId];
        }
        setSavedAddresses(updated);
        if (!selectedAddressId && updated.length === 1) setSelectedAddressId(addrWithId.id);
        await db.collection('canteen_users').doc(currentUser.id).update({ savedAddresses: updated });
        setNewAddress({ quarterNo: '', block: '', label: '' });
        setShowAddAddress(false); setEditingAddress(null);
        setSuccess(editingAddress ? 'Address updated' : 'Address saved');
        setTimeout(() => setSuccess(''), 2000);
      };
      const deleteAddress = async (addrId) => {
        const updated = savedAddresses.filter(a => a.id !== addrId);
        setSavedAddresses(updated);
        if (selectedAddressId === addrId) setSelectedAddressId(updated[0]?.id || '');
        await db.collection('canteen_users').doc(currentUser.id).update({ savedAddresses: updated });
      };
      const setDefaultAddress = async (addrId) => {
        const updated = savedAddresses.map(a => ({ ...a, isDefault: a.id === addrId }));
        setSavedAddresses(updated);
        setSelectedAddressId(addrId);
        await db.collection('canteen_users').doc(currentUser.id).update({ savedAddresses: updated });
      };

      const groupedAvailable = useMemo(() => {
        const grouped = {};
        availableItems.forEach(item => {
          if (!grouped[item.category]) grouped[item.category] = [];
          grouped[item.category].push(item);
        });
        return grouped;
      }, [availableItems]);

      return (
        <div style={{ padding: '1.5rem' }}>
          {/* Tab Navigation */}
          <div style={{ display: 'flex', gap: '1rem', marginBottom: '1.5rem', borderBottom: '2px solid var(--border)' }}>
            <button
              onClick={() => setActiveTab('menu')}
              style={{
                padding: '0.75rem 1.5rem',
                background: 'none',
                border: 'none',
                borderBottom: activeTab === 'menu' ? '2px solid var(--primary)' : 'none',
                color: activeTab === 'menu' ? 'var(--primary)' : 'var(--text-secondary)',
                fontWeight: 600,
                cursor: 'pointer'
              }}
            >
              <Icons.Menu /> Menu
            </button>
            <button
              onClick={() => setActiveTab('cart')}
              style={{
                padding: '0.75rem 1.5rem',
                background: 'none',
                border: 'none',
                borderBottom: activeTab === 'cart' ? '2px solid var(--primary)' : 'none',
                color: activeTab === 'cart' ? 'var(--primary)' : 'var(--text-secondary)',
                fontWeight: 600,
                cursor: 'pointer'
              }}
            >
              <Icons.ShoppingCart /> Cart ({cartItems.length})
            </button>
            <button
              onClick={() => setActiveTab('orders')}
              style={{
                padding: '0.75rem 1.5rem',
                background: 'none',
                border: 'none',
                borderBottom: activeTab === 'orders' ? '2px solid var(--primary)' : 'none',
                color: activeTab === 'orders' ? 'var(--primary)' : 'var(--text-secondary)',
                fontWeight: 600,
                cursor: 'pointer'
              }}
            >
              <Icons.Package /> My Orders
            </button>
            <button
              onClick={() => setActiveTab('profile')}
              style={{
                padding: '0.75rem 1.5rem',
                background: 'none',
                border: 'none',
                borderBottom: activeTab === 'profile' ? '2px solid var(--primary)' : 'none',
                color: activeTab === 'profile' ? 'var(--primary)' : 'var(--text-secondary)',
                fontWeight: 600,
                cursor: 'pointer'
              }}
            >
              <Icons.User /> Profile
            </button>
          </div>

          {error && <div className="alert-warning" style={{ marginBottom: '1rem' }}>{error}</div>}
          {success && <div className="alert-success" style={{ marginBottom: '1rem' }}>{success}</div>}

          {!settings?.orderingEnabled && (
            <div className="alert-warning" style={{ marginBottom: '1rem' }}>
              <Icons.AlertCircle /> Ordering is currently disabled by canteen in-charge
            </div>
          )}

          {/* MENU TAB */}
          {activeTab === 'menu' && (
            <>
              {Object.entries(groupedAvailable).map(([category, items]) => (
                <div key={category} style={{ marginBottom: '2rem' }}>
                  <h3 style={{ fontSize: '1.2rem', fontWeight: 600, marginBottom: '1rem', color: 'var(--primary)' }}>{category}</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))', gap: '1rem' }}>
                    {items.map(item => (
                      <div key={item.id} className="glass-panel" style={{ padding: '1rem' }}>
                        <h4 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '0.25rem' }}>{item.name}</h4>
                        {item.description && <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>{item.description}</p>}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '0.75rem' }}>
                          <span style={{ fontSize: '1.1rem', fontWeight: 600, color: 'var(--primary)' }}>{formatPrice(item.price)}</span>
                          <button onClick={() => addToCart(item)} className="btn-primary" style={{ padding: '0.5rem 1rem' }} disabled={!settings?.orderingEnabled}>
                            <Icons.Plus /> Add
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}

              {scheduledLaterItems.length > 0 && (
                <div style={{ marginTop: '3rem' }}>
                  <h3 style={{ fontSize: '1.2rem', fontWeight: 600, marginBottom: '1rem', color: 'var(--text-muted)' }}>Available Later</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))', gap: '1rem', opacity: 0.7 }}>
                    {scheduledLaterItems.map(item => (
                      <div key={item.id} className="glass-panel" style={{ padding: '1rem' }}>
                        <h4 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '0.25rem' }}>{item.name}</h4>
                        {item.description && <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>{item.description}</p>}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '0.75rem' }}>
                          <span style={{ fontSize: '1.1rem', fontWeight: 600 }}>{formatPrice(item.price)}</span>
                          <span className="badge-primary" style={{ fontSize: '0.7rem' }}>
                            <Icons.Clock /> {formatTime12(item.availableFrom)} – {formatTime12(item.availableTo)}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {unavailableItems.length > 0 && (
                <div style={{ marginTop: '3rem' }}>
                  <h3 style={{ fontSize: '1.2rem', fontWeight: 600, marginBottom: '1rem', color: 'var(--text-muted)' }}>Currently Unavailable</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))', gap: '1rem', opacity: 0.5 }}>
                    {unavailableItems.map(item => (
                      <div key={item.id} className="glass-panel" style={{ padding: '1rem' }}>
                        <h4 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '0.25rem' }}>{item.name}</h4>
                        {item.description && <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>{item.description}</p>}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '0.75rem' }}>
                          <span style={{ fontSize: '1.1rem', fontWeight: 600 }}>{formatPrice(item.price)}</span>
                          <span className="badge-warning">Unavailable</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {/* CART TAB */}
          {activeTab === 'cart' && (
            <div>
              {cartItems.length === 0 ? (
                <div className="glass-panel" style={{ padding: '3rem', textAlign: 'center' }}>
                  <Icons.ShoppingCart />
                  <p style={{ marginTop: '1rem', color: 'var(--text-secondary)' }}>Your cart is empty</p>
                  <button onClick={() => setActiveTab('menu')} className="btn-primary" style={{ marginTop: '1rem' }}>
                    Browse Menu
                  </button>
                </div>
              ) : (
                <>
                  <div style={{ marginBottom: '1.5rem' }}>
                    {cartItems.map(item => (
                      <div key={item.id} className="glass-panel" style={{ padding: '1rem', marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div style={{ flex: 1 }}>
                          <h4 style={{ fontSize: '1rem', fontWeight: 600 }}>{item.name}</h4>
                          <p style={{ fontSize: '0.9rem', color: 'var(--text-secondary)' }}>{formatPrice(item.price)} × {item.quantity} = {formatPrice(item.price * item.quantity)}</p>
                        </div>
                        <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                          <button onClick={() => updateQuantity(item.id, -1)} className="icon-button">
                            <Icons.Minus />
                          </button>
                          <span style={{ minWidth: '2rem', textAlign: 'center', fontWeight: 600 }}>{item.quantity}</span>
                          <button onClick={() => updateQuantity(item.id, 1)} className="icon-button">
                            <Icons.Plus />
                          </button>
                          <button onClick={() => updateQuantity(item.id, -item.quantity)} className="icon-button">
                            <Icons.Trash />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1.5rem' }}>
                    <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <Icons.MapPin /> Delivery Address
                    </h3>
                    {savedAddresses.length > 0 ? (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                        <select
                          value={selectedAddressId}
                          onChange={(e) => {
                            if (e.target.value === 'new') {
                              setShowAddAddress(true);
                            } else {
                              setSelectedAddressId(e.target.value);
                              setShowAddAddress(false);
                            }
                          }}
                          style={{ padding: '0.75rem', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}
                        >
                          <option value="" disabled>Select an address...</option>
                          {savedAddresses.map(addr => (
                            <option key={addr.id} value={addr.id}>
                              {addr.label ? `${addr.label}: ` : ''}{addr.quarterNo}, {addr.block}
                            </option>
                          ))}
                          <option value="new">+ Add New Address</option>
                        </select>
                      </div>
                    ) : (
                      <div>
                        <p style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', marginBottom: '1rem' }}>No saved addresses. Please add one.</p>
                        {!showAddAddress && (
                          <button onClick={() => setShowAddAddress(true)} className="btn-secondary" style={{ width: '100%' }}>
                            <Icons.Plus /> Add Delivery Address
                          </button>
                        )}
                      </div>
                    )}

                    {showAddAddress && (
                      <div style={{ marginTop: '1rem', padding: '1rem', background: 'var(--background)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}>
                        <h4 style={{ fontSize: '0.95rem', fontWeight: 600, marginBottom: '0.75rem' }}>New Address</h4>
                        <div style={{ display: 'grid', gap: '0.75rem' }}>
                          <input
                            type="text"
                            placeholder="Quarter No. (e.g., B-12)"
                            value={newAddress.quarterNo}
                            onChange={e => setNewAddress({ ...newAddress, quarterNo: e.target.value })}
                          />
                          <input
                            type="text"
                            placeholder="Block (e.g., Block B)"
                            value={newAddress.block}
                            onChange={e => setNewAddress({ ...newAddress, block: e.target.value })}
                          />
                          <input
                            type="text"
                            placeholder="Label (e.g., Home, Office) - Optional"
                            value={newAddress.label}
                            onChange={e => setNewAddress({ ...newAddress, label: e.target.value })}
                          />
                          <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
                            <button
                              onClick={() => {
                                if (!newAddress.quarterNo || !newAddress.block) {
                                  setError('Quarter No. and Block are required');
                                  return;
                                }
                                saveAddress(newAddress);
                              }}
                              className="btn-primary"
                              style={{ flex: 1 }}
                            >
                              Save Address
                            </button>
                            <button onClick={() => setShowAddAddress(false)} className="btn-secondary">
                              Cancel
                            </button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="glass-panel" style={{ padding: '1.5rem', background: 'var(--primary-subtle)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                      <span style={{ fontSize: '1rem', color: 'var(--text-secondary)' }}>Subtotal</span>
                      <span style={{ fontSize: '1.1rem', fontWeight: 600 }}>{formatPrice(cartSubtotal)}</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', paddingBottom: '1rem', borderBottom: '1px solid rgba(5,150,105,0.2)' }}>
                      <span style={{ fontSize: '1rem', color: 'var(--text-secondary)' }}>Delivery Fee</span>
                      {deliveryFee === 0 ? (
                        <span className="badge-success">Free Delivery</span>
                      ) : (
                        <span style={{ fontSize: '1.1rem', fontWeight: 600 }}>{formatPrice(deliveryFee)}</span>
                      )}
                    </div>
                    {deliveryFee > 0 && settings?.freeDeliveryAbove && (
                      <p style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginBottom: '1rem', textAlign: 'right' }}>
                        Add {formatPrice(settings.freeDeliveryAbove - cartSubtotal)} more for free delivery
                      </p>
                    )}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                      <span style={{ fontSize: '1.2rem', fontWeight: 600 }}>Total</span>
                      <span style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--primary)' }}>{formatPrice(cartTotal)}</span>
                    </div>

                    {isBelowMin && (
                      <div className="alert-warning" style={{ marginBottom: '1rem' }}>
                        <Icons.AlertCircle /> Minimum order value is {formatPrice(minOrderValue)}
                      </div>
                    )}

                    <button
                      onClick={placeOrder}
                      className="btn-primary"
                      style={{ width: '100%' }}
                      disabled={!settings?.orderingEnabled || isBelowMin || cartItems.length === 0}
                    >
                      Place Order
                    </button>
                  </div>
                </>
              )}
            </div>
          )}

          {/* ORDERS TAB */}
          {activeTab === 'orders' && (
            <div>
              {myOrders.length === 0 ? (
                <div className="glass-panel" style={{ padding: '3rem', textAlign: 'center' }}>
                  <Icons.Package />
                  <p style={{ marginTop: '1rem', color: 'var(--text-secondary)' }}>No orders yet</p>
                  <button onClick={() => setActiveTab('menu')} className="btn-primary" style={{ marginTop: '1rem' }}>
                    Start Ordering
                  </button>
                </div>
              ) : (
                <div style={{ display: 'grid', gap: '1rem' }}>
                  {myOrders.map(order => (
                    <div key={order.id} className="glass-panel" style={{ padding: '1.5rem' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem' }}>
                        <div>
                          <h4 style={{ fontSize: '1.1rem', fontWeight: 600 }}>Order #{order.orderId}</h4>
                          <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>
                            <Icons.Clock /> {order.createdAt?.toDate().toLocaleString()}
                          </p>
                        </div>
                        <span className={`badge-${order.status === 'delivered' ? 'success' : order.status === 'ready' ? 'primary' : 'warning'}`}>
                          {order.status.toUpperCase()}
                        </span>
                      </div>

                      <div style={{ marginBottom: '1rem' }}>
                        {order.items.map((item, idx) => (
                          <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', borderBottom: '1px solid var(--border)' }}>
                            <span>{item.name} × {item.quantity}</span>
                            <span>{formatPrice(item.price * item.quantity)}</span>
                          </div>
                        ))}
                        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', color: 'var(--text-secondary)' }}>
                          <span>Subtotal</span>
                          <span>{formatPrice(order.subtotalAmount || order.totalAmount)}</span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', borderBottom: '1px solid var(--border)', color: 'var(--text-secondary)' }}>
                          <span>Delivery Fee</span>
                          <span>{order.deliveryFee ? formatPrice(order.deliveryFee) : 'Free'}</span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.75rem 0', fontWeight: 600, fontSize: '1.1rem', borderTop: '2px solid var(--border)', marginTop: '0.5rem' }}>
                          <span>Total</span>
                          <span style={{ color: 'var(--primary)' }}>{formatPrice(order.totalAmount)}</span>
                        </div>
                      </div>

                      {order.deliveryAddress && (
                        <div style={{ background: 'var(--background)', padding: '0.75rem', borderRadius: '0.375rem', marginBottom: '1rem', border: '1px solid var(--border)' }}>
                          <h5 style={{ fontSize: '0.9rem', fontWeight: 600, marginBottom: '0.25rem', display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                            <Icons.MapPin /> Delivery Address
                          </h5>
                          <p style={{ fontSize: '0.85rem' }}>
                            {order.deliveryAddress.label && <span style={{ fontWeight: 600 }}>{order.deliveryAddress.label}: </span>}
                            Quarter {order.deliveryAddress.quarterNo}, {order.deliveryAddress.block}
                          </p>
                        </div>
                      )}

                      <div style={{ background: 'var(--surface)', padding: '1rem', borderRadius: '0.375rem', marginBottom: '1rem' }}>
                        <p style={{ fontSize: '0.85rem', marginBottom: '0.5rem' }}>
                          <strong>Canteen Contact:</strong> {order.canteenInchargeName} - {order.canteenInchargePhone}
                        </p>
                        {order.status !== 'delivered' && (
                          <div style={{ marginTop: '1rem', textAlign: 'center' }}>
                            <p style={{ fontSize: '0.85rem', fontWeight: 600, color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>
                              Scan to confirm delivery:
                            </p>
                            <img src={generateQRDataUrl(order.orderId)} alt="Delivery QR Code" style={{ display: 'block', margin: '0 auto 0.5rem', width: '120px', height: '120px' }} />
                            <p style={{ fontSize: '0.85rem', fontWeight: 600, color: 'var(--primary)' }}>
                              Or provide OTP: {order.deliveryOTP}
                            </p>
                          </div>
                        )}
                      </div>

                      {order.status !== 'delivered' && (
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                          <input
                            type="text"
                            placeholder="Enter OTP to confirm delivery"
                            value={selectedOrder === order.id ? otpInput : ''}
                            onChange={e => { setSelectedOrder(order.id); setOtpInput(e.target.value); setError(''); }}
                            maxLength="4"
                            style={{ flex: 1 }}
                          />
                          <button onClick={() => verifyAndDeliver(order)} className="btn-primary">
                            <Icons.Check /> Confirm Delivery
                          </button>
                        </div>
                      )}

                      {order.status === 'delivered' && (
                        <div className="alert-success">
                          <Icons.Check /> Delivered on {order.deliveredAt?.toDate().toLocaleString()}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* PROFILE TAB */}
          {activeTab === 'profile' && (
        <div className="glass-panel" style={{ padding: '1.5rem' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '2rem' }}>
            <div style={{ width: '60px', height: '60px', borderRadius: '50%', background: 'var(--primary-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--primary)' }}>
              <Icons.User />
            </div>
            <div>
              <h3 style={{ fontSize: '1.3rem', fontWeight: 600 }}>{currentUser.name}</h3>
              <p style={{ color: 'var(--text-secondary)' }}>ID: {currentUser.personnelNo}</p>
            </div>
          </div>

          <div style={{ marginBottom: '2rem' }}>
            <h4 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem', borderBottom: '1px solid var(--border)', paddingBottom: '0.5rem' }}>Personal Details</h4>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem' }}>
              <div>
                <label style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Phone</label>
                <p style={{ fontWeight: 500 }}>{currentUser.phone || 'N/A'}</p>
              </div>
              <div>
                <label style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Designation</label>
                <p style={{ fontWeight: 500 }}>{currentUser.designation}</p>
              </div>
            </div>
          </div>

          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', borderBottom: '1px solid var(--border)', paddingBottom: '0.5rem' }}>
              <h4 style={{ fontSize: '1.1rem', fontWeight: 600 }}>Saved Addresses</h4>
              <button onClick={() => { setEditingAddress(null); setNewAddress({ quarterNo: '', block: '', label: '' }); setShowAddAddress(true); }} className="icon-button" style={{ color: 'var(--primary)' }}>
                <Icons.Plus /> Add
              </button>
            </div>

            {showAddAddress && (
              <div style={{ marginBottom: '1.5rem', padding: '1rem', background: 'var(--background)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}>
                <h5 style={{ fontSize: '0.95rem', fontWeight: 600, marginBottom: '0.75rem' }}>{editingAddress ? 'Edit Address' : 'New Address'}</h5>
                <div style={{ display: 'grid', gap: '0.75rem' }}>
                  <input type="text" placeholder="Quarter No. (e.g., B-12)" value={newAddress.quarterNo} onChange={e => setNewAddress({ ...newAddress, quarterNo: e.target.value })} />
                  <input type="text" placeholder="Block (e.g., Block B)" value={newAddress.block} onChange={e => setNewAddress({ ...newAddress, block: e.target.value })} />
                  <input type="text" placeholder="Label (e.g., Home, Office) - Optional" value={newAddress.label} onChange={e => setNewAddress({ ...newAddress, label: e.target.value })} />
                  <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
                    <button onClick={() => saveAddress(newAddress)} className="btn-primary" style={{ flex: 1 }}>Save</button>

                    <div style={{ display: 'flex', gap: '0.5rem' }}>

                      <button onClick={() => { setEditingAddress(addr); setNewAddress({ quarterNo: addr.quarterNo, block: addr.block, label: addr.label || '' }); setShowAddAddress(true); }} className="icon-button" title="Edit">

    // ============================================================
    // CANTEEN SETTINGS (Admin/Canteen Incharge)
    // ============================================================
    function CanteenSettings() {
      const [settings, setSettings] = useState({
        orderingEnabled: true,
        canteenInchargePhone: '',
        canteenInchargeName: '',
        minOrderValue: 50,
        deliveryFee: 25,
        freeDeliveryAbove: 149
      });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      useEffect(() => {
        const unsubscribe = db.collection('canteen_settings').doc('general')
          .onSnapshot(doc => {
            if (doc.exists) {
              setSettings(doc.data());
            }
            setLoading(false);
          });
        return unsubscribe;
      }, []);

      const handleUpdate = async () => {
        setError('');
        setSuccess('');

        if (!/^\d{10}$/.test(settings.canteenInchargePhone)) {
          setError('Phone number must be 10 digits');
          return;
        }

        try {
          await db.collection('canteen_settings').doc('general').set({
            ...settings,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setSuccess('Settings updated successfully');
        } catch (err) {
          setError(err.message);
        }
      };

      if (loading) return <div style={{ padding: '1.5rem' }}>Loading...</div>;

      return (
        <div style={{ padding: '1.5rem' }}>
          <h2 style={{ fontSize: '1.5rem', fontWeight: 600, marginBottom: '1.5rem' }}>Canteen Settings</h2>

          {error && <div className="alert-warning" style={{ marginBottom: '1rem' }}>{error}</div>}
          {success && <div className="alert-success" style={{ marginBottom: '1rem' }}>{success}</div>}

          <div className="glass-panel" style={{ padding: '1.5rem' }}>
            <div style={{ marginBottom: '1.5rem' }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', fontSize: '1.1rem', fontWeight: 600 }}>
                <input
                  type="checkbox"
                  checked={settings.orderingEnabled}
                  onChange={e => setSettings({ ...settings, orderingEnabled: e.target.checked })}
                  style={{ width: '1.25rem', height: '1.25rem' }}
                />
                Enable Ordering
              </label>
              <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginTop: '0.5rem', marginLeft: '1.75rem' }}>
                When disabled, users cannot place new orders
              </p>
            </div>

            <div className="form-group">
              <label>Canteen In-charge Name</label>
              <input
                type="text"
                value={settings.canteenInchargeName}
                onChange={e => setSettings({ ...settings, canteenInchargeName: e.target.value })}
              />
            </div>

            <div className="form-group">
              <label>Canteen In-charge Phone</label>
              <input
                type="tel"
                value={settings.canteenInchargePhone}
                onChange={e => setSettings({ ...settings, canteenInchargePhone: e.target.value.replace(/\D/g, '') })}
                maxLength="10"
              />
            </div>

            <div style={{ borderTop: '1px solid var(--border)', marginTop: '1.5rem', paddingTop: '1.5rem' }}>
              <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem', color: 'var(--primary)' }}>🚨 Delivery & Order Settings</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem' }}>
                <div className="form-group">
                  <label>Min Order Value (₹)</label>
                  <input
                    type="number"
                    value={settings.minOrderValue ?? 50}
                    onChange={e => setSettings({ ...settings, minOrderValue: parseFloat(e.target.value) || 0 })}
                    min="0"
                  />
                </div>
                <div className="form-group">
                  <label>Delivery Fee (₹)</label>
                  <input
                    type="number"
                    value={settings.deliveryFee ?? 25}
                    onChange={e => setSettings({ ...settings, deliveryFee: parseFloat(e.target.value) || 0 })}
                    min="0"
                  />
                </div>
                <div className="form-group">
                  <label>Free Delivery Above (₹)</label>
                  <input
                    type="number"

    // ============================================================
    // ACTIVE ORDERS COMPONENT (Admin/Canteen Incharge)
    // ============================================================
    function ActiveOrdersManagement() {
      const [activeOrders, setActiveOrders] = useState([]);
      const [deliveryStaff, setDeliveryStaff] = useState([]);
      const [selectedOrder, setSelectedOrder] = useState(null);
      const [otpInput, setOtpInput] = useState('');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [scanning, setScanning] = useState(false);

      useEffect(() => {
        const unsubscribeOrders = db.collection('orders')
          .orderBy('createdAt', 'desc')
          .onSnapshot(snapshot => {
            const orders = snapshot.docs
              .map(doc => ({ id: doc.id, ...doc.data() }))
              .filter(order => order.status !== 'delivered');
            setActiveOrders(orders);
          });

        const unsubscribeStaff = db.collection('canteen_users')
          .where('role', '==', 'delivery')
          .onSnapshot(snapshot => {
            const staff = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            staff.sort((a, b) => a.id.localeCompare(b.id));
            setDeliveryStaff(staff);
          });

        return () => { unsubscribeOrders(); unsubscribeStaff(); };
      }, []);

      useEffect(() => {
        let html5QrcodeScanner;
        if (scanning) {
          html5QrcodeScanner = new window.Html5QrcodeScanner("reader-admin", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
          html5QrcodeScanner.render(
            (decodedText) => {
              if (selectedOrder) {
                if (decodedText === selectedOrder.orderId) {
                  html5QrcodeScanner.clear();
                  setScanning(false);
                  verifyAndDeliver(selectedOrder, selectedOrder.deliveryOTP);
                } else {
                  setError('QR code does not match this order!');
                }
              }
            },
            (err) => { /* Ignore regular scan errors */ }
          );
        }
        return () => {
          if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.log('Failed to clear scanner'));
        };
      }, [scanning, selectedOrder]);

      const verifyAndDeliver = async (order, otpToVerify) => {
        if (!otpToVerify) { setError('Please enter OTP or scan QR'); return; }
        if (otpToVerify !== order.deliveryOTP) { setError('Invalid OTP'); return; }

        try {
          await db.collection('orders').doc(order.id).update({
            status: 'delivered',
            deliveredAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setSuccess(`Order #${order.orderId} marked as delivered!`);
          setOtpInput('');
          setSelectedOrder(null);
          setScanning(false);
          setTimeout(() => setSuccess(''), 3000);
        } catch (err) {
          setError(err.message);
        }
      };

      const updateStatus = async (order, newStatus) => {
        try {
          const updateData = { status: newStatus };
          await db.collection('orders').doc(order.id).update(updateData);
        } catch (err) {
          alert('Error updating status: ' + err.message);
        }
      };

      const assignOrder = async (order, staffId) => {
        if (!staffId) return;
        try {
          await db.collection('orders').doc(order.id).update({
            assignedTo: staffId,
            status: 'ready for delivery' // Automatically update status when assigned
          });
        } catch (err) {
          alert('Error assigning order: ' + err.message);
        }
      };

      return (
        <div style={{ padding: '1.5rem' }}>
          <h2 style={{ fontSize: '1.5rem', fontWeight: 600, marginBottom: '1.5rem' }}>Live Active Orders</h2>
          
          {error && <div className="alert-warning" style={{ marginBottom: '1rem' }}>{error}</div>}
          {success && <div className="alert-success" style={{ marginBottom: '1rem' }}>{success}</div>}

          {activeOrders.length === 0 ? (
            <div className="glass-panel" style={{ padding: '3rem', textAlign: 'center' }}>
              <Icons.Package />
              <p style={{ marginTop: '1rem', color: 'var(--text-secondary)' }}>No active orders right now.</p>
            </div>
          ) : (
            <div style={{ display: 'grid', gap: '1rem' }}>
              {activeOrders.map(order => (
                <div key={order.id} className="glass-panel" style={{ padding: '1.5rem', borderLeft: '4px solid var(--primary)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem', flexWrap: 'wrap', gap: '1rem' }}>
                    <div>
                      <h4 style={{ fontSize: '1.1rem', fontWeight: 600 }}>Order #{order.orderId}</h4>
                      <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>
                        <Icons.User /> {order.userName} ({order.userId}) | <Icons.Clock /> {order.createdAt?.toDate().toLocaleString()}
                      </p>
                      {order.deliveryAddress && (
                        <p style={{ fontSize: '0.9rem', marginTop: '0.5rem', color: 'var(--primary)', fontWeight: 500 }}>
                          <Icons.MapPin /> Delivery: Quarter {order.deliveryAddress.quarterNo}, {order.deliveryAddress.block}
                        </p>
                      )}
                    </div>
                    <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                      <select
                        value={order.assignedTo || ''}
                        onChange={(e) => assignOrder(order, e.target.value)}
                        style={{ padding: '0.5rem', borderRadius: '0.375rem', border: '1px solid var(--primary)', background: 'var(--surface)', fontWeight: 600, color: 'var(--primary)' }}
                      >
                        <option value="" disabled>Assign to Delivery Man</option>
                        {deliveryStaff.map(staff => (
                          <option key={staff.id} value={staff.id}>{staff.id} - {staff.name}</option>
                        ))}
                      </select>
                      <select
                        value={order.status}
                        onChange={(e) => updateStatus(order, e.target.value)}
                        style={{ padding: '0.5rem', borderRadius: '0.375rem', border: '1px solid var(--border)', background: 'var(--surface)', fontWeight: 600 }}
                      >
                        <option value="pending">Pending</option>
                        <option value="accepted & preparing">Accepted & Preparing</option>
                        <option value="ready for delivery">Ready for delivery</option>
                      </select>
                    </div>
                  </div>
                  <div style={{ marginBottom: '1rem', background: 'var(--background)', padding: '1rem', borderRadius: '0.375rem' }}>
                    {order.items.map((item, idx) => (
                      <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', padding: '0.25rem 0' }}>
                        <span><strong style={{ color: 'var(--primary)' }}>{item.quantity}x</strong> {item.name}</span>
                        <span style={{ fontWeight: 500 }}>{formatPrice(item.price * item.quantity)}</span>
                      </div>
                    ))}
                    <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: '0.5rem', marginTop: '0.5rem', borderTop: '1px solid var(--border)', fontWeight: 700 }}>
                      <span>Total:</span>
                      <span style={{ color: 'var(--primary)' }}>{formatPrice(order.totalAmount)}</span>
                    </div>
                  </div>

                  <div style={{ border: '2px solid #000', padding: '1rem', borderRadius: '0.375rem', background: 'var(--surface)' }}>
                    <h5 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <Icons.Check /> Complete Delivery
                    </h5>
                    
                    {scanning && selectedOrder?.id === order.id ? (
                      <div>
                        <div id="reader-admin" style={{ width: '100%', maxWidth: '400px', margin: '0 auto 1rem auto' }}></div>
                        <button onClick={() => { setScanning(false); setSelectedOrder(null); setError(''); }} className="btn-secondary" style={{ width: '100%' }}>Cancel Scan</button>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                        <button 
                          onClick={() => { setSelectedOrder(order); setScanning(true); setError(''); setOtpInput(''); }} 
                          className="btn-primary" 
                          style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem' }}
                        >
                          <Icons.Scan /> Scan QR
                        </button>
                        
                        <div style={{ flex: 1, display: 'flex', gap: '0.5rem', minWidth: '200px' }}>
                          <input 
                            type="text" 
                            placeholder="Or enter OTP manually" 
                            value={selectedOrder?.id === order.id ? otpInput : ''}
                            onChange={e => { setSelectedOrder(order); setOtpInput(e.target.value); }}
                            maxLength="4"
                            style={{ flex: 1 }}
                          />
                          <button onClick={() => verifyAndDeliver(order, otpInput)} className="btn-primary" disabled={!otpInput || selectedOrder?.id !== order.id}>
                            Submit
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
